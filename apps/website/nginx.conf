server {
    listen 80;
    server_name vertex-cms.com;

    # API requests → NestJS backend
    location /api/ {
        proxy_pass http://vertex-api:3001;
    }

    # Uploaded files
    location /uploads/ {
        proxy_pass http://vertex-api:3001;
    }

    # Everything else → Angular SSR
    location / {
        proxy_pass http://vertex-ssr:4000;
    }
}
